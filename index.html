<!DOCTYPE html>
<html>
<head>
    <title>University Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>University Registration Form</h2>

<div class="form-box">

    <label>Student ID</label>
    <input type="text" id="studentId">

    <label>Name</label>
    <input type="text" id="name">

    <label>Address</label>
    <input type="text" id="address">

    <label>Phone</label>
    <input type="text" id="phone">

    <label>Major</label>
    <input type="text" id="major">

    <label>Course Name</label>
    <input type="text" id="courseName">

    <label>Course Number</label>
    <input type="text" id="courseNumber">

    <button onclick="addRow()">Add to Spreadsheet</button>
    <button onclick="saveCSV()">Save to CSV</button>

</div>

<h3>Student Spreadsheet</h3>

<table id="dataTable">
    <thead>
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Major</th>
            <th>Course Name</th>
            <th>Course Number</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script src="script.js"></script>

</body>
</html>
